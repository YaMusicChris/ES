<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Canciones | Ya! Music Chris
    </title>


    <link rel="icon"
    href="https://yamusicchris.github.io/icon.png">


    <link rel="stylesheet"
    href="style.css">


</head>


<body>


<header>


    <img 
    src="https://yamusicchris.github.io/icon.png"
    alt="Ya! Music Chris">


    <nav>
        <a href="https://yamusicchris.github.io/ES/">
            Inicio
        </a>
    </nav>


</header>





<section class="hero">


    <h1>
        Canciones Oficiales
    </h1>


    <p>
        Escucha todas las canciones oficiales de
        Ya! Music Chris directamente desde nuestro reproductor.
    </p>


</section>






<section 
class="songs"
id="songs">
</section>









<!-- =========================
     REPRODUCTOR
========================= -->


<div class="player">



    <div class="player-left">


        <img 
        id="player-cover"
        src="https://yamusicchris.github.io/icon.png"
        alt="Portada">


        <div class="player-info">


            <div id="player-title">

                Selecciona una canción

            </div>



            <div id="player-artist">

                Ya! Music Chris

            </div>


        </div>


    </div>







    <div class="player-center">



        <div class="player-controls">



            <button 
            id="prev-btn"
            class="player-btn"
            aria-label="Anterior">


                <img
                src="https://yamusicchris.github.io/icons-repro/previous.png"
                alt="Anterior">


            </button>






            <button 
            id="play-btn"
            class="player-btn main"
            aria-label="Reproducir">


                <img
                src="https://yamusicchris.github.io/icons-repro/play.png"
                alt="Reproducir">


            </button>







            <button 
            id="next-btn"
            class="player-btn"
            aria-label="Siguiente">


                <img
                src="https://yamusicchris.github.io/icons-repro/next.png"
                alt="Siguiente">


            </button>



        </div>







        <div class="progress">



            <span id="current-time">
                0:00
            </span>




            <input 
            id="progress"
            type="range"
            min="0"
            max="100"
            value="0">





            <span id="duration">
                0:00
            </span>



        </div>




    </div>









    <div class="player-right">



        <span>
            🔊
        </span>



        <input
        id="volume"
        type="range"
        min="0"
        max="100"
        value="100">



    </div>





</div>









<footer>


    © 2023–2026 Ya! Music Chris.
    All rights reserved.


</footer>







<script src="app.js"></script>


</body>


</html>
